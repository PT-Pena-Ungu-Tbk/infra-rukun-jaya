version: '3.8'

services:
  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:15-alpine
    container_name: rukun-jaya-db
    restart: always
    environment:
      POSTGRES_DB: rukun_jaya_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_rahasia
    ports:
      - "5432:5432"
    volumes:  
      - pgdata:/var/lib/postgresql/data

   # --- BACKEND (Express.js + Prisma) ---
  backend:
    build: 
      context: ../be-rukun-jaya  # Merujuk ke folder backend
      dockerfile: Dockerfile     # Menggunakan Dockerfile yang baru kita buat
    container_name: rukun-jaya-backend
    ports:
      - "5000:5000"
    environment:
      # URL Database menunjuk ke service 'db' (PostgreSQL container)
      - DATABASE_URL=postgresql://postgres:password_rahasia@db:5432/rukun_jaya_db?schema=public
      - JWT_SECRET=rahasia_super_aman # Ganti dengan secret Anda
      - PORT=5000
    depends_on:
      - db


  # --- FRONTEND (Next.js) ---
  frontend:
    image: node:18-alpine
    container_name: rukun-jaya-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../fe-rukun-jaya:/app
      - /app/node_modules # Mencegah bentrok dengan node_modules lokal
      - /app/.next        # Menjaga cache build Next.js
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"
    tty: true

# Deklarasi Volume untuk Penyimpanan Data Database Permanen
volumes:
  pgdata: